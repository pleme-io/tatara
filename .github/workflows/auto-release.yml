name: auto-release

# Three-line consumer shim. Every push to main runs the pleme-io
# substrate Rust-workspace auto-release pipeline (bump workspace
# version → commit → tag → push → publish-each-member to crates.io
# in dep order). The reusable workflow lives at
# pleme-io/substrate/.github/workflows/rust-auto-release.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        description: "patch | minor | major"
        required: false
        default: patch

jobs:
  release:
    uses: pleme-io/substrate/.github/workflows/rust-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type || 'patch' }}
    secrets: inherit
