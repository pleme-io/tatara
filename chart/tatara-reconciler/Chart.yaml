apiVersion: v2
name: tatara-reconciler
description: |
  The unified FluxCD-adjacent Kubernetes controller — reconciles `Process`
  CRDs as Unix processes in the tatara convergence lattice. Emits
  Kustomization / HelmRelease CRs with owner references; composes three-pillar
  BLAKE3 attestation chains on every convergence cycle.
