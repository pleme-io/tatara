{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tatara-reconciler.fullname" . }}
  labels:
    {{- include "tatara-reconciler.labels" . | nindent 4 }}
rules:
  # ── Own the Process / ProcessTable CRDs ─────────────────────────────
  - apiGroups: ["tatara.pleme.io"]
    resources: ["processes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["tatara.pleme.io"]
    resources: ["processes/status", "processes/finalizers"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["tatara.pleme.io"]
    resources: ["processtables"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["tatara.pleme.io"]
    resources: ["processtables/status"]
    verbs: ["get", "update", "patch"]

  # ── Emit + manage FluxCD resources as owned children ────────────────
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ── Read Flux sources (GitRepository / HelmRepository / OCIRepository) ─
  # Needed so `intent.flux.gitRepository` references can be validated.
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
      - ocirepositories
      - buckets
    verbs: ["get", "list", "watch"]

  # ── Event emission (for kubectl events / audit trail) ───────────────
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # ── Core resources for boundary condition evaluators (future) ───────
  - apiGroups: [""]
    resources: ["configmaps", "namespaces"]
    verbs: ["get", "list", "watch"]

  # ── Leader election (future — single-replica for now) ───────────────
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
