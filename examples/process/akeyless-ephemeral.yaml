---
# Closed-loop attested Akeyless SaaS + Gateway as a single tatara Process.
# This YAML is the exact ProcessSpec that the companion
# `akeyless-ephemeral.lisp` lowers to via `From<EphemeralSpec>`.
#
# Three things to notice:
#   1. `intent.aplicacao` — FluxCD HelmRelease emission for a typed
#      pleme-io Aplicacao chart. The reconciler reads the
#      profile + values overlay and emits OCIRepository + HelmRelease
#      with owner refs in this namespace.
#   2. `lifetime.ephemeral` — TTL + teardown policy; tatara-reconciler's
#      lifetime_clock auto-SIGTERMs on Attested → Exiting → Zombie →
#      Reaped.
#   3. `boundary.postconditions[ClosedLoopAuth]` — promotes "the
#      gateway↔SaaS loop holds" from an assertion into a theorem
#      provable per run via a BLAKE3 receipt the
#      akeyless-closed-loop-probe Job emits.
apiVersion: tatara.pleme.io/v1alpha1
kind: Process
metadata:
  name: akeyless-closed-loop-attest
  namespace: akeyless-test
  labels:
    tatara.pleme.io/point-type: Gate
    tatara.pleme.io/substrate: Compute
spec:
  classification:
    pointType: Gate
    substrate: Compute
    horizon:
      kind: Bounded
    calm: NonMonotone
    dataClassification: Internal
  intent:
    aplicacao:
      chartRef: "oci://ghcr.io/pleme-io/charts/lareira-akeyless-deployment"
      version: "0.5.5"
      profile: "gateway-with-internal-saas"
      releaseName: "akeyless-saas-consolidated"
      targetNamespace: "akeyless-test"
      installTimeout: "25m"
      valuesOverlay:
        cluster:
          name: ephemeral-test-01
        data:
          mysql:
            persistence: { enabled: false }
          rabbitmq:
            persistence: { enabled: false }
        compliance:
          overlays: []
        closedLoopProbe:
          enabled: true
          issuer:
            service: akeyless-saas-akeyless-gator
            port: 8080
          consumer:
            service: akeyless-saas-akeyless-gateway
            port: 8000
  lifetime:
    ephemeral:
      ttl: "1h"
      teardownPolicy: OnAttested
      maxConcurrent: 1
  boundary:
    postconditions:
      - kind: HelmReleaseReleased
        params:
          name: akeyless-saas-consolidated
          namespace: akeyless-test
      - kind: ClosedLoopAuth
        params:
          issuer:
            service: akeyless-saas-akeyless-gator
            port: 8080
            jwksPath: /.well-known/jwks.json
          consumer:
            service: akeyless-saas-akeyless-gateway
            port: 8000
            authPath: /v2/whoami
          probeImage: "ghcr.io/pleme-io/closed-loop-probe:0.1.0"
